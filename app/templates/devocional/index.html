<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ context.title_site }} - {{ context.slogan_site }}</title>
    <link rel="shortcut icon" href="../static/imagens/favicon/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/devocional.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="player">
            <div class="info w-75">
                <img src="../../static/imagens/devocionais/lo-fi.jpeg" alt="cover">
                <div>
                    <h3 class='songs-name'>Lo-Fi: Phasing</h3>
                    <p class="artist-name">Astronaut</p>
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Abrir Playlist
                        </button>
                        <ul class="dropdown-menu">
                            <li class="dropdown-item" onclick="change_music('lo-fi-astronaut-phasing.mp3', 'Lo-Fi - Phasing', 'Astronaut', 'lo-fi')">
                                Lo-fi - Phasing 
                                <small>Astronaut</small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('lo-fi-astronaut-design-for-dreaming.mp3', 'Lo-fi - Design For Dreaming', 'Astronaut', 'lo-fi')">
                                Lo-fi - Design For Dreaming
                                <small>Astronaut</small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('vibedepot-lo-fi.mp3', 'Lo-fi', 'VibeDepot', 'lo-fi')">
                                Lo-fi
                                <small>VibeDepot</small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('astronaut-autumn-in-the-air.mp3', 'Autumn In The Air', 'VibeDepot', 'lo-fi')">
                                Lo-fi - Autumn in The Air
                                <small>Astronaut</small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('pulsar-the-grey-room.mp3', 'Pulsar', 'The Gray Room', 'ambiente')">
                                Ambiente - Pulsar
                                <small>The Gray Room</small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('gospel-worship.mp3', 'Glorify Him', 'NO DATA', 'worship')">
                                Worship - Glorify Him
                                <small></small>
                            </li>
                            <li class="dropdown-item" onclick="change_music('gospel-worship-2.mp3', 'In His Name', 'NO DATA', 'worship')">
                                Worship - In His Name
                                <small>NO DATA</small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="bloco_controls w-25">
                <div class="controls">
                    <button id="play">▶</button>
                </div>

                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </div>
            <audio id="audio" src="../../static/audio/devocional/lo-fi/lo-fi-astronaut-phasing.mp3"></audio>
        </div>
    </header>
    <section id="devocional">
        <div class="content">
            <h1>Devocional de Hoje</h1>
            <h3 id="livro"></h3>
            <div id="text">
            </div>
        </div>
    </section>
</body>

</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="../../static/js/devocional.js"></script>
