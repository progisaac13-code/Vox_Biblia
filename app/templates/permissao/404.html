<!DOCTYPE html>

    <title>{{ context.title_site }} - {{ context.slogan_site }}</title>
    <link rel="shortcut icon" href="../static/imagens/favicon/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link

        rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('../../static/imagens/devocao.webp') no-repeat fixed;
            backdrop-filter: blur(2px);
            background-position: center;
            background-size: cover;
            height: 100vh;
        }

        div.aviso-permissao {
            text-align: center;
            padding: 120px 50px;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.8);
            background: #FACC15;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            color: #0F172A;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 18px;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="aviso-permissao">
        <img src="../../static/imagens/logo/logo-vox-biblia.webp" alt="" width="150" class="mb-4">
        <h1>Acesso Não Permitido!</h1>
        <p>Faça <a href="{{ url_for('login') }}">login</a> para acessar esta página e tenha acesso a todas as funcionalidades.</p>
